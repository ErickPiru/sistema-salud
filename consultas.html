<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta - Registro de Historia Clínica</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#165DFF',
                        secondary: '#36CFC0',
                        light: '#F2F5F7',
                        dark: '#1D2129'
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .scrollbar-hide {
                -ms-overflow-style: none;
                scrollbar-width: none;
            }
            .scrollbar-hide::-webkit-scrollbar {
                display: none;
            }
        }
    </style>
</head>
<body class="bg-gray-50 font-sans text-dark min-h-screen py-8 px-4">
    <div class="container mx-auto max-w-4xl">
        <header class="mb-10 text-center">
            <h1 class="text-[clamp(1.6rem,2.8vw,2.6rem)] font-bold text-primary mb-2">
                <i class="fa fa-heartbeat mr-2"></i>REGISTRO DE HISTORIA CLINICAS DEL PUESTO DE SALUD EL LIMON
            </h1>
            <p class="text-gray-500 italic">📄 MÓDULO DE CONSULTA - Solo visualización de datos</p>
        </header>

        <!-- BUSQUEDA -->
        <div class="bg-white rounded-xl shadow-lg p-6 mb-8">
            <h2 class="text-xl font-semibold mb-5 text-center text-secondary">
                <i class="fa fa-search mr-2"></i>Buscar Paciente
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-5">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Por Nombres</label>
                    <input type="text" id="buscarNombres" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-secondary/50 focus:border-secondary outline-none transition" placeholder="Buscar por nombre...">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Por Apellidos</label>
                    <input type="text" id="buscarApellidos" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-secondary/50 focus:border-secondary outline-none transition" placeholder="Buscar por apellido...">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Por DNI</label>
                    <input type="text" id="buscarDni" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-secondary/50 focus:border-secondary outline-none transition" placeholder="Buscar por DNI..." maxlength="8">
                </div>
            </div>
            <button id="btnBuscar" class="w-full bg-secondary hover:bg-secondary/90 text-white font-medium py-2.5 rounded-lg transition">
                <i class="fa fa-search mr-1"></i> Realizar Búsqueda
            </button>
        </div>

        <!-- LISTADO -->
        <div class="bg-white rounded-xl shadow-lg p-6">
            <h2 class="text-xl font-semibold mb-4 text-center text-secondary">
                <i class="fa fa-list-alt mr-2"></i>Listado de Pacientes
            </h2>
            <div class="overflow-x-auto">
                <table class="w-full min-w-[600px]">
                    <thead>
                        <tr class="bg-gray-100 text-gray-700">
                            <th class="px-3 py-3 text-left">Nombres</th>
                            <th class="px-3 py-3 text-left">Apellidos</th>
                            <th class="px-3 py-3 text-left">DNI</th>
                            <th class="px-3 py-3 text-left">Teléfono</th>
                            <th class="px-3 py-3 text-left">N° HC</th>
                        </tr>
                    </thead>
                    <tbody id="tablaRegistros">
                        <tr><td colspan="5" class="text-center py-6 text-gray-500">Cargando datos...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // TU ENLACE ACTUALIZADO
        const URL_BASE_DATOS = "https://script.google.com/macros/s/AKfycbxkMtA0qQTdrw34NKF_WRnWIRqQgE9tXdErC3wlu7pAynxmuUaINvJ6emd87lW7Ft6d/exec";
        let datosCompletos = [];

        const tablaRegistros = document.getElementById('tablaRegistros');
        const btnBuscar = document.getElementById('btnBuscar');
        const buscarNombres = document.getElementById('buscarNombres');
        const buscarApellidos = document.getElementById('buscarApellidos');
        const buscarDni = document.getElementById('buscarDni');

        // Cargar todos los datos al inicio
        async function cargarDatos() {
            try {
                const respuesta = await fetch(URL_BASE_DATOS + "?t=" + Date.now());
                datosCompletos = await respuesta.json();
                if (datosCompletos.error) throw new Error(datosCompletos.error);
                mostrarResultados(datosCompletos);
            } catch (error) {
                tablaRegistros.innerHTML = `<tr><td colspan="5" class="text-center py-4 text-red-500">❌ Error al cargar: ${error}</td></tr>`;
            }
        }

        // Mostrar registros en la tabla
        function mostrarResultados(lista) {
            tablaRegistros.innerHTML = "";
            if (lista.length === 0) {
                tablaRegistros.innerHTML = `<tr><td colspan="5" class="text-center py-6 text-gray-500">⚠️ No se encontraron resultados</td></tr>`;
                return;
            }

            lista.forEach(paciente => {
                const fila = document.createElement('tr');
                fila.className = "hover:bg-gray-50 border-b border-gray-200";
                fila.innerHTML = `
                    <td class="px-3 py-3">${paciente.nombres}</td>
                    <td class="px-3 py-3">${paciente.apellidos}</td>
                    <td class="px-3 py-3">${paciente.dni}</td>
                    <td class="px-3 py-3">${paciente.telefono}</td>
                    <td class="px-3 py-3 font-medium text-primary">${paciente.historiaClinica}</td>
                `;
                tablaRegistros.appendChild(fila);
            });
        }

        // ✅ BÚSQUEDA CORREGIDA Y FUNCIONANDO
        btnBuscar.addEventListener('click', function() {
            // Convertir todo a minúsculas para que no distinga mayúsculas/minúsculas
            const textoNombre = buscarNombres.value.trim().toLowerCase();
            const textoApellido = buscarApellidos.value.trim().toLowerCase();
            const textoDni = buscarDni.value.trim().toLowerCase();

            // Filtrar datos
            const resultados = datosCompletos.filter(paciente => {
                const coincideNombre = paciente.nombres.toLowerCase().includes(textoNombre);
                const coincideApellido = paciente.apellidos.toLowerCase().includes(textoApellido);
                const coincideDni = String(paciente.dni).toLowerCase().includes(textoDni); // Convertimos a texto por si es número
                return coincideNombre && coincideApellido && coincideDni;
            });

            mostrarResultados(resultados);
        });

        // Cargar al abrir la página
        cargarDatos();
    </script>
</body>
</html>
