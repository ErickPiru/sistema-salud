<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta de Pacientes - Puesto de Salud El Limon</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#165DFF',
                        secondary: '#36CFC0',
                        light: '#F2F5F7',
                        dark: '#1D2129'
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .scrollbar-hide {
                -ms-overflow-style: none;
                scrollbar-width: none;
            }
            .scrollbar-hide::-webkit-scrollbar {
                display: none;
            }
        }
    </style>
</head>
<body class="bg-gray-50 font-sans text-dark min-h-screen">

    <div class="container mx-auto px-4 py-8 max-w-6xl">
        <!-- Encabezado -->
        <header class="mb-10 text-center">
            <h1 class="text-[clamp(1.6rem,2.8vw,2.6rem)] font-bold text-primary mb-2">
                <i class="fa fa-heartbeat mr-2"></i>REGISTRO DE HISTORIA CLINICAS DEL PUESTO DE SALUD EL LIMON
            </h1>
            <p class="text-gray-600">📄 MÓDULO DE CONSULTA - Solo visualización de datos</p>
        </header>

        <!-- Sección de Búsqueda -->
        <div class="bg-white rounded-xl shadow-lg p-6 mb-8">
            <h2 class="text-xl font-semibold mb-4 text-center text-secondary">
                <i class="fa fa-search mr-2"></i>Buscar Paciente
            </h2>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-3 mb-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Por Nombres</label>
                    <input type="text" id="buscarNombres" class="w-full px-4 py-2 border border-gray-300 rounded-lg" placeholder="Buscar por nombre...">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Por Apellidos</label>
                    <input type="text" id="buscarApellidos" class="w-full px-4 py-2 border border-gray-300 rounded-lg" placeholder="Buscar por apellido...">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Por DNI</label>
                    <input type="text" id="buscarDni" class="w-full px-4 py-2 border border-gray-300 rounded-lg" placeholder="Buscar por DNI..." maxlength="8">
                </div>
            </div>

            <button id="btnBuscar" class="w-full bg-secondary hover:bg-secondary/90 text-white font-medium py-2 rounded-lg transition">
                <i class="fa fa-search mr-1"></i> Realizar Búsqueda
            </button>
        </div>

        <!-- Resultados / Listado -->
        <div class="bg-white rounded-xl shadow-lg p-6">
            <h2 class="text-xl font-semibold mb-4 text-center text-secondary">
                <i class="fa fa-list-alt mr-2"></i>Listado de Pacientes
            </h2>

            <div class="overflow-x-auto">
                <table class="w-full min-w-[700px]">
                    <thead>
                        <tr class="bg-gray-100 text-gray-700">
                            <th class="px-3 py-3 text-left font-semibold">Nombres</th>
                            <th class="px-3 py-3 text-left font-semibold">Apellidos</th>
                            <th class="px-3 py-3 text-left font-semibold">DNI</th>
                            <th class="px-3 py-3 text-left font-semibold">Teléfono</th>
                            <th class="px-3 py-3 text-left font-semibold">N° HC</th>
                        </tr>
                    </thead>
                    <tbody id="tablaRegistros" class="divide-y divide-gray-200">
                        <!-- Aquí se cargan los datos -->
                        <tr>
                            <td colspan="5" class="px-3 py-4 text-center text-gray-500">Cargando datos...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Script -->
    <script>
        // ⚠️ URL DE LA BASE DE DATOS (Misma que la otra página)
        const URL_BASE_DATOS = "https://script.google.com/macros/s/AKfycbyTjBDKKuMTdZASxKU16WUQsrwL3-ztC0JF6pgbilJCbu1g4TQTfkox6Nd2ddFTIjnd/exec";

        const tablaRegistros = document.getElementById('tablaRegistros');
        const btnBuscar = document.getElementById('btnBuscar');

        // Cargar todos los registros al inicio
        async function cargarDatos() {
            try {
                const respuesta = await fetch(URL_BASE_DATOS);
                const datos = await respuesta.json();
                mostrarRegistros(datos);
            } catch (error) {
                tablaRegistros.innerHTML = `<tr><td colspan="5" class="text-center py-4 text-red-500">❌ Error al conectar</td></tr>`;
            }
        }

        // Mostrar registros en la tabla
        function mostrarRegistros(lista) {
            tablaRegistros.innerHTML = '';

            if (lista.length === 0) {
                tablaRegistros.innerHTML = `<tr><td colspan="5" class="px-3 py-4 text-center text-gray-500">No se encontraron resultados</td></tr>`;
                return;
            }

            lista.forEach(p => {
                const fila = document.createElement('tr');
                fila.className = 'hover:bg-gray-50 transition';
                fila.innerHTML = `
                    <td class="px-3 py-3">${p.nombres}</td>
                    <td class="px-3 py-3">${p.apellidos}</td>
                    <td class="px-3 py-3">${p.dni}</td>
                    <td class="px-3 py-3">${p.telefono}</td>
                    <td class="px-3 py-3 font-medium text-primary">${p.historiaClinica}</td>
                `;
                tablaRegistros.appendChild(fila);
            });
        }

        // Función de búsqueda
        btnBuscar.addEventListener('click', async function() {
            const bN = document.getElementById('buscarNombres').value.toLowerCase();
            const bA = document.getElementById('buscarApellidos').value.toLowerCase();
            const bD = document.getElementById('buscarDni').value.toLowerCase();
            
            const resp = await fetch(URL_BASE_DATOS);
            const todos = await resp.json();
            
            const filtrados = todos.filter(p => 
                p.nombres.toLowerCase().includes(bN) &&
                p.apellidos.toLowerCase().includes(bA) &&
                p.dni.includes(bD)
            );
            mostrarRegistros(filtrados);
        });

        // Cargar datos al abrir la página
        cargarDatos();
    </script>
</body>
</html>
